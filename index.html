<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model TBY-8 Radio Transceiver</title>
    <style>
        body {
            background-color: #1a1c18;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
            color: #d1d5c8;
        }

        /* Main Chassis */
        .chassis {
            background: #464a3d; /* Olive drab / Parkerized metal */
            width: 420px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 
                20px 25px 40px rgba(0,0,0,0.9),
                inset 2px 2px 5px rgba(255,255,255,0.2),
                inset -4px -4px 15px rgba(0,0,0,0.6);
            border: 2px solid #2a2d24;
            position: relative;
        }

        /* Scratched metal texture overlay */
        .chassis::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(45deg, rgba(0,0,0,0) 40%, rgba(0,0,0,0.05) 45%, rgba(0,0,0,0) 50%),
                radial-gradient(circle, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 100% 100%, 4px 4px;
            pointer-events: none;
        }

        .nameplate {
            text-align: center;
            background: #111;
            color: #fff;
            padding: 5px;
            border: 2px solid #555;
            border-radius: 3px;
            font-size: 0.8em;
            letter-spacing: 1px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px #000;
        }

        /* Analog Meter */
        .meter-bezel {
            width: 140px;
            height: 100px;
            background: #000;
            border-radius: 5px 5px 50% 50%;
            margin: 0 auto 25px auto;
            padding: 8px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.7), inset 0 2px 5px rgba(255,255,255,0.2);
        }

        .meter-face {
            width: 100%;
            height: 100%;
            background: #e6e3ce;
            border-radius: 3px 3px 50% 50%;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        .meter-scale {
            position: absolute;
            top: 10px; left: 10px; right: 10px; height: 40px;
            border-top: 2px solid #333;
            border-radius: 50% 50% 0 0;
        }

        .meter-needle {
            width: 2px;
            height: 65px;
            background: #b32400;
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform-origin: bottom center;
            transform: rotate(-45deg);
            transition: transform 0.1s cubic-bezier(0.4, 0.0, 0.2, 1);
            box-shadow: 1px 0 2px rgba(0,0,0,0.5);
        }

        /* Control Panel Layout */
        .panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .label {
            font-size: 0.7em;
            font-weight: bold;
            color: #d1d5c8;
            text-shadow: 1px 1px 0px #000;
            margin-bottom: 10px;
            text-align: center;
        }

        /* Knobs */
        .knob-base {
            background: #1a1a1a;
            border-radius: 50%;
            box-shadow: 0 8px 15px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.1);
            cursor: grab;
            position: relative;
        }
        .knob-base:active { cursor: grabbing; }

        .knob-grip {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-conic-gradient(#2a2a2a 0 10deg, #111 10deg 20deg);
            border: 2px solid #000;
            position: absolute;
            top: 0; left: 0;
        }

        .knob-mark {
            width: 4px;
            height: 25%;
            background: #fff;
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
        }

        /* Specific Knob Sizes */
        .knob-small { width: 70px; height: 70px; }
        .knob-large { width: 120px; height: 120px; margin: 0 auto; grid-column: span 2; }

        /* Frequency Readout */
        .readout {
            background: #0a0a0a;
            color: #e6e3ce;
            border: 2px solid #222;
            padding: 5px 15px;
            border-radius: 3px;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
            box-shadow: inset 0 3px 8px #000;
            grid-column: span 2;
            letter-spacing: 2px;
        }

        /* Band Select Indicators */
        .band-label {
            position: absolute;
            font-size: 0.6em;
            font-weight: bold;
            color: #a0a595;
        }
        .band-A { top: 15px; left: -15px; }
        .band-B { top: -15px; left: 20px; }
        .band-C { top: -15px; right: 20px; }
        .band-D { top: 15px; right: -15px; }

    </style>
</head>
<body>

    <div class="chassis">
        <div class="nameplate">NAVY DEPT. - MODEL TBY-8<br>SERIAL NO. 1648</div>
        
        <div class="meter-bezel">
            <div class="meter-face">
                <div class="meter-scale"></div>
                <div class="meter-needle" id="needle"></div>
            </div>
        </div>

        <div class="panel">
            <div class="control-group">
                <div class="label">AUDIO FIL<br>(VOL / PWR)</div>
                <div class="knob-base knob-small" id="vol-knob">
                    <div class="knob-grip" id="vol-rotator" style="transform: rotate(-135deg);">
                        <div class="knob-mark"></div>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <div class="label">RCVR BAND</div>
                <div class="band-label band-A">A</div>
                <div class="band-label band-B">B</div>
                <div class="band-label band-C">C</div>
                <div class="band-label band-D">D</div>
                <div class="knob-base knob-small" id="band-knob">
                    <div class="knob-grip" id="band-rotator" style="transform: rotate(-45deg);">
                        <div class="knob-mark"></div>
                    </div>
                </div>
            </div>

            <div class="control-group" style="margin-top: 20px;">
                <div class="label">RCVR TUNE</div>
                <div class="knob-base knob-large" id="tune-knob">
                    <div class="knob-grip" id="tune-rotator" style="transform: rotate(0deg);">
                        <div class="knob-mark"></div>
                    </div>
                </div>
            </div>

            <div class="readout" id="freq-display">28.0 MHz</div>
        </div>
    </div>

    <script>
        // --- State Variables ---
        let volume = 0; // 0 to 100
        let currentBandIndex = 0; // 0=A, 1=B, 2=C, 3=D
        const bands = [
            { name: 'A', min: 28.0, max: 38.0 },
            { name: 'B', min: 38.0, max: 50.0 },
            { name: 'C', min: 50.0, max: 68.0 },
            { name: 'D', min: 68.0, max: 80.0 }
        ];
        let currentFreq = bands[0].min;
        let isPowerOn = false;
        
        let targetTimer = null;
        let isAtTarget = false;
        const TARGET_FREQ = 64.0;

        // --- Audio File Handling ---
        // REPLACE THIS URL WITH YOUR ACTUAL UPLOADED FILE URL
        const TRANSMISSION_FILE = 'ElevenLabs_2026-06-15T15_43_36_Oleg - Calm, Natural and Clear_pvc_sp120_s10_sb40_v3.mp3';
        let transmissionAudio = new Audio(TRANSMISSION_FILE);
        transmissionAudio.loop = true;

        // --- DOM Elements ---
        const volRotator = document.getElementById('vol-rotator');
        const bandRotator = document.getElementById('band-rotator');
        const tuneRotator = document.getElementById('tune-rotator');
        const freqDisplay = document.getElementById('freq-display');
        const needle = document.getElementById('needle');

        // --- Audio Engine ---
        let audioCtx, masterGain, noiseSource, noiseFilter;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0;
            masterGain.connect(audioCtx.destination);
            
            // Connect transmission audio to the same master gain
            let source = audioCtx.createMediaElementSource(transmissionAudio);
            source.connect(masterGain);
        }

        function playStatic() {
            if (!audioCtx) return;
            if (noiseSource) return;

            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = buffer;
            noiseSource.loop = true;

            noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.Q.value = 1.2;
            noiseFilter.frequency.value = 800;

            noiseSource.connect(noiseFilter);
            noiseFilter.connect(masterGain);
            noiseSource.start();
        }

        function stopStatic() {
            if (noiseSource) {
                noiseSource.stop();
                noiseSource.disconnect();
                noiseFilter.disconnect();
                noiseSource = null;
                noiseFilter = null;
            }
        }

        function playTransmission() {
            transmissionAudio.play();
        }

        function stopTransmission() {
            transmissionAudio.pause();
            transmissionAudio.currentTime = 0;
        }

        // --- Logic Engine ---
        function updateRadioState() {
            if (volume > 0) {
                if (!isPowerOn) {
                    isPowerOn = true;
                    initAudio();
                }
                masterGain.gain.setTargetAtTime(Math.pow(volume / 100, 2), audioCtx.currentTime, 0.1);
                
                let baseNeedle = -20 + (volume * 0.4);
                needle.style.transform = `rotate(${baseNeedle}deg)`;
                
                if (currentFreq === TARGET_FREQ) {
                    if (!isAtTarget) {
                        isAtTarget = true;
                        playStatic();
                        
                        targetTimer = setTimeout(() => {
                            stopStatic();
                            playTransmission();
                        }, 500);
                    }
                } else {
                    if (isAtTarget) {
                        isAtTarget = false;
                        clearTimeout(targetTimer);
                        stopTransmission();
                    }
                    playStatic();
                    needle.style.transform = `rotate(${baseNeedle + (Math.random() * 5 - 2.5)}deg)`;
                }

            } else {
                isPowerOn = false;
                isAtTarget = false;
                clearTimeout(targetTimer);
                if (masterGain) masterGain.gain.value = 0;
                stopStatic();
                stopTransmission();
                needle.style.transform = `rotate(-45deg)`;
            }
            
            freqDisplay.textContent = `${currentFreq.toFixed(1)} MHz`;
        }

        setInterval(() => {
            if (isPowerOn && !isAtTarget && volume > 0) {
                let baseNeedle = -20 + (volume * 0.4);
                needle.style.transform = `rotate(${baseNeedle + (Math.random() * 6 - 3)}deg)`;
            }
        }, 100);

        // --- Drag Controls ---
        let activeKnob = null;
        let startY = 0;
        let startVal = 0;

        function handleDrag(y) {
            if (!activeKnob) return;
            let deltaY = startY - y;

            if (activeKnob === 'vol') {
                let newVal = Math.max(0, Math.min(100, startVal + deltaY));
                volume = newVal;
                volRotator.style.transform = `rotate(${-135 + (volume * 2.7)}deg)`;
                updateRadioState();
            } 
            else if (activeKnob === 'tune') {
                let rawFreq = startVal + (deltaY / 30); 
                let band = bands[currentBandIndex];
                
                currentFreq = Math.max(band.min, Math.min(band.max, rawFreq));
                currentFreq = Math.round(currentFreq * 10) / 10;
                
                let rot = (currentFreq - band.min) * 20; 
                tuneRotator.style.transform = `rotate(${rot}deg)`;
                
                updateRadioState();
            }
        }

        document.getElementById('vol-knob').addEventListener('mousedown', (e) => {
            activeKnob = 'vol'; startY = e.clientY; startVal = volume;
        });
        document.getElementById('tune-knob').addEventListener('mousedown', (e) => {
            activeKnob = 'tune'; startY = e.clientY; startVal = currentFreq;
        });

        window.addEventListener('mousemove', (e) => handleDrag(e.clientY));
        window.addEventListener('mouseup', () => activeKnob = null);

        document.getElementById('band-knob').addEventListener('mousedown', () => {
            currentBandIndex = (currentBandIndex + 1) % 4;
            let angles = [-45, -15, 15, 45];
            bandRotator.style.transform = `rotate(${angles[currentBandIndex]}deg)`;
            
            currentFreq = bands[currentBandIndex].min;
            tuneRotator.style.transform = `rotate(0deg)`;
            
            updateRadioState();
        });

    </script>
</body>
</html>
